<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IT Nanbargal</title>
  <meta name="robots" content="noindex" />
  <script>
    // GitHub Pages SPA redirect trick
    // Stores the full path in sessionStorage then redirects to index.html
    var l = window.location;
    sessionStorage.redirect = l.href;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/'
    );
  </script>
</head>
<body></body>
</html>
